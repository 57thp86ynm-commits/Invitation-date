<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Date Invitation 💖</title>
<style>
  body {
    text-align: center;
    font-family: Arial, sans-serif;
    margin-top: 100px;
    background-color: #ffe6f0;
    overflow: hidden;
  }

  h1 {
    font-size: 2em;
  }

  p {
    font-size: 1.2em;
  }

  button {
    font-size: 20px;
    padding: 10px 20px;
    margin: 20px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
  }

  #yes {
    background-color: #ff4d88;
    color: white;
  }

  #no {
    background-color: #ccc;
    position: absolute;
    left: 50%;
    top: 60%;
    transform: translate(-50%, -50%);
  }

  #result {
    display: none;
    margin-top: 30px;
  }

  img {
    width: 280px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<h1>💌 Special Invitation 💌</h1>

<p>
Do you accept to go on a date with me Friday at 8:30 PM at Buen Apetito? 😏💕
<br><br>
Yes or… yes?
</p>

<button id="yes">Yes 😍</button>
<button id="no">No 🙈</button>

<div id="result">
  <h2>YAAAY 😍💖</h2>
  <p>
    I knew you'd say yes 😏💕<br>
    This could be us Friday night ❤️
  </p>
  <img src="photo.jpg" alt="us together">
</div>

<script>
  const noBtn = document.getElementById("no");
  const yesBtn = document.getElementById("yes");
  const result = document.getElementById("result");

  document.addEventListener("mousemove", (e) => {
    const rect = noBtn.getBoundingClientRect();
    const distance = Math.hypot(
      e.clientX - (rect.left + rect.width / 2),
      e.clientY - (rect.top + rect.height / 2)
    );

    if (distance < 120) {
      const x = Math.random() * (window.innerWidth - rect.width);
      const y = Math.random() * (window.innerHeight - rect.height);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }
  });

  yesBtn.addEventListener("click", () => {
    result.style.display = "block";
  });
</script>

</body>
</html>
