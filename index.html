<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation - Date</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .message {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .date-display {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .date-display p {
            color: #764ba2;
            font-size: 1.5em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Bienvenue ✨</h1>
        <p class="message">Votre page est maintenant opérationnelle !</p>
        <div class="date-display">
            <p id="currentDate"></p>
        </div>
        <p class="message">Cette page a été créée le 28 avril 2026</p>
    </div>
    
    <script>
        // Afficher la date actuelle
        const today = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric', language: 'fr' };
        document.getElementById('currentDate').textContent = today.toLocaleDateString('fr-FR', options);
    </script>
</body>
</html>
