<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invitation 💖</title>

<style>
  body {
    text-align: center;
    font-family: Arial, sans-serif;
    margin-top: 120px;
    background-color: #ffe6f0;
    overflow: hidden;
  }

  h1 {
    font-size: 2em;
  }

  button {
    font-size: 20px;
    padding: 10px 25px;
    margin: 20px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
  }

  #yes {
    background-color: #ff4d88;
    color: white;
  }

  #no {
    background-color: #ccc;
  }

  #message {
    display: none;
    margin-top: 30px;
    font-size: 1.5em;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
  }
</style>
</head>

<body>

<h1>Do you accept to go on a date with me Friday at 8:30 PM at Buen Apetito? 😏💕</h1>

<button id="yes">Yes 😍</button>
<button id="no">No 🙈</button>

<div id="message">
  I can't wait to see you again ❤️
</div>

<canvas id="confetti"></canvas>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const message = document.getElementById("message");
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

function createConfetti() {
  for (let i = 0; i < 200; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      r: Math.random() * 6 + 2,
      d: Math.random() * 10 + 5,
      color: `hsl(${Math.random() * 360}, 100%, 60%)`,
      tilt: Math.random() * 10 - 10
    });
  }
}

function drawConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  pieces.forEach((p, i) => {
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.y += p.d;
    p.x += Math.sin(p.tilt);

    if (p.y > canvas.height) {
      pieces[i].y = -10;
    }
  });

  requestAnimationFrame(drawConfetti);
}

yesBtn.addEventListener("click", () => {
  message.style.display = "block";
  createConfetti();
  drawConfetti();
});

// No button moves away
document.addEventListener("mousemove", (e) => {
  const rect = noBtn.getBoundingClientRect();
  const distance = Math.hypot(
    e.clientX - (rect.left + rect.width / 2),
    e.clientY - (rect.top + rect.height / 2)
  );

  if (distance < 100) {
    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random() * (window.innerWidth - rect.width) + "px";
    noBtn.style.top = Math.random() * (window.innerHeight - rect.height) + "px";
  }
});
</script>

</body>
</html>
